<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Typing Tutor - Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --correct: #22c55e;
            --wrong: #ef4444;
        }

        .light-mode {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --accent: #0284c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: 0.3s;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(56, 189, 248, 0.3);
        }

        .mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 30px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: bold;
        }

        #text-display {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            min-height: 100px;
        }

        .highlight-correct { color: var(--correct); }
        .highlight-wrong { color: var(--wrong); text-decoration: underline; }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--accent);
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .stat-box {
            background: rgba(56, 189, 248, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--accent);
        }

        .level-btns {
            margin-bottom: 15px;
        }

        .level-btns button {
            margin: 5px;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--text);
        }

        .level-btns button.active {
            background: var(--accent);
            color: white;
        }

        button.reset-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--correct);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <button class="mode-toggle" onclick="toggleTheme()">🌓 Change Theme</button>

    <div class="container">
        <h1>AR Typing Tutor</h1>
        
        <div class="level-btns">
            <button onclick="setLevel('easy')" id="btn-easy" class="active">Easy</button>
            <button onclick="setLevel('medium')" id="btn-medium">Medium</button>
            <button onclick="setLevel('hard')" id="btn-hard">Hard</button>
        </div>

        <div id="text-display">Loading text...</div>

        <textarea id="input-field" placeholder="Type here to start..." spellcheck="false"></textarea>

        <div class="stats-container">
            <div class="stat-box">Time: <span id="timer">60</span>s</div>
            <div class="stat-box">WPM: <span id="wpm">0</span></div>
            <div class="stat-box">Acc: <span id="accuracy">100</span>%</div>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Test</button>
    </div>

    <audio id="key-sound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>

    <script>
        const texts = {
            easy: ["The cat is black.", "I love coding.", "Sun rises in east.", "Keep it simple."],
            medium: ["Programming is the art of telling a computer what to do.", "Success is not final, failure is not fatal.", "Practice makes a man perfect."],
            hard: ["Synchronous communication requires immediate attention while asynchronous does not.", "Developing a professional website requires patience and constant learning.", "Artificial intelligence is transforming the digital world."]
        };

        let currentLevel = 'easy';
        let timer = 60;
        let interval = null;
        let isStarted = false;
        let totalChars = 0;

        const display = document.getElementById('text-display');
        const input = document.getElementById('input-field');
        const timerEl = document.getElementById('timer');
        const wpmEl = document.getElementById('wpm');
        const accEl = document.getElementById('accuracy');
        const keySound = document.getElementById('key-sound');

        function setLevel(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.level-btns button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lvl).classList.add('active');
            resetGame();
        }

        function loadText() {
            const levelTexts = texts[currentLevel];
            display.innerText = levelTexts[Math.floor(Math.random() * levelTexts.length)];
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        input.addEventListener('input', () => {
            if (!isStarted) {
                startTimer();
                isStarted = true;
            }
            
            // Play Sound
            keySound.currentTime = 0;
            keySound.play();

            const quote = display.innerText.split('');
            const val = input.value.split('');
            let html = '';
            let correct = 0;

            quote.forEach((char, i) => {
                if (val[i] == null) {
                    html += `<span>${char}</span>`;
                } else if (val[i] === char) {
                    html += `<span class="highlight-correct">${char}</span>`;
                    correct++;
                } else {
                    html += `<span class="highlight-wrong">${char}</span>`;
                }
            });

            display.innerHTML = html;
            
            // Stats
            let acc = (correct / (val.length || 1)) * 100;
            accEl.innerText = Math.round(acc);

            if (val.length >= quote.length) {
                totalChars += val.length;
                input.value = "";
                loadText();
            }
        });

        function startTimer() {
            interval = setInterval(() => {
                timer--;
                timerEl.innerText = timer;
                
                // WPM calculation
                let words = (totalChars + input.value.length) / 5;
                let minutes = (60 - timer) / 60;
                wpmEl.innerText = Math.round(words / minutes) || 0;

                if (timer === 0) {
                    clearInterval(interval);
                    input.disabled = true;
                    alert("Time's up! Your WPM: " + wpmEl.innerText);
                }
            }, 1000);
        }

        function resetGame() {
            clearInterval(interval);
            timer = 60;
            isStarted = false;
            totalChars = 0;
            input.value = "";
            input.disabled = false;
            timerEl.innerText = timer;
            wpmEl.innerText = "0";
            accEl.innerText = "100";
            loadText();
        }

        loadText();
    </script>
</body>
</html>
